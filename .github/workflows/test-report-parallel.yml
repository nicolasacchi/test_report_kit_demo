name: Test Report (Parallel)
on:
  push:
    branches: ['feature/parallel-tests']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 0
            specs: "spec/models/ spec/jobs/"
          - node: 1
            specs: "spec/services/"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - run: bundle exec rails db:create db:migrate
      env:
        RAILS_ENV: test

    - name: Run tests (node ${{ matrix.node }})
      env:
        RAILS_ENV: test
        TEST_ENV_NUMBER: ${{ matrix.node }}
        FPROF: json
        EVENT_PROF: factory.create
        RD_PROF: "1"
        TEST_REPORT_BRANCH: ${{ github.ref_name }}
        TEST_REPORT_SHA: ${{ github.sha }}
        NODE_SPECS: ${{ matrix.specs }}
      run: |
        mkdir -p tmp/test_report
        bundle exec rspec $NODE_SPECS \
          --format json --out tmp/test_report/rspec_results.json \
          --format progress

    - name: Upload node artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.node }}
        path: |
          coverage/
          tmp/test_report/
          tmp/test_prof/

  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - run: bundle exec rails db:create db:migrate
      env:
        RAILS_ENV: test

    - uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Merge and generate report
      env:
        RAILS_ENV: test
        TEST_REPORT_BRANCH: ${{ github.ref_name }}
        TEST_REPORT_SHA: ${{ github.sha }}
      run: |
        bundle exec rake "test_report:merge[artifacts/test-results-*]"

    - name: Upload merged report
      uses: actions/upload-artifact@v4
      with:
        name: test-report-merged
        path: tmp/test_report/

    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: site
      continue-on-error: true

    - name: Init site dir
      run: |
        if [ ! -d site/.git ]; then
          mkdir -p site
          cd site
          git init -b gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "Init gh-pages"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        fi

    - name: Copy report
      env:
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        BRANCH_DIR=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
        rm -rf "site/${BRANCH_DIR}"
        cp -r tmp/test_report "site/${BRANCH_DIR}"

    - name: Generate landing page
      run: |
        cat > site/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="en">
        <head><meta charset="UTF-8"><title>Test Report Kit Demo</title>
        <style>
          body { font-family: 'JetBrains Mono', monospace; background: #0b0e14; color: #e2e8f0; padding: 48px; max-width: 600px; margin: 0 auto; }
          h1 { font-size: 20px; margin-bottom: 8px; }
          h1 span { color: #3b82f6; }
          p { color: #556177; font-size: 13px; margin-bottom: 32px; }
          a { color: #3b82f6; text-decoration: none; }
          a:hover { text-decoration: underline; }
          .list { list-style: none; padding: 0; }
          .list li { padding: 12px 16px; border: 1px solid #1a2230; border-radius: 8px; margin-bottom: 8px; background: #161c28; }
          .list li:hover { border-color: #232d3f; }
        </style>
        </head>
        <body>
        <h1><span>&rarr;</span> test_report_kit_demo<span>/</span>reports</h1>
        <p>Coverage and profiling dashboards generated by <a href="https://github.com/nicolasacchi/test_report_kit">test_report_kit</a></p>
        <ul class="list" id="reports"></ul>
        <script>
        HTMLEOF
        echo "const reports = [" >> site/index.html
        for dir in site/*/; do
          [ -f "${dir}index.html" ] && echo "  '$(basename $dir)'," >> site/index.html
        done
        echo "];" >> site/index.html
        cat >> site/index.html << 'HTMLEOF2'
        reports.forEach(r => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${r}/">${r}</a>`;
          document.getElementById('reports').appendChild(li);
        });
        </script>
        </body></html>
        HTMLEOF2

    - name: Push to gh-pages
      run: |
        cd site
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add -A
        git diff --staged --quiet || git commit -m "Deploy parallel report"
        git push origin gh-pages

    - uses: actions/upload-pages-artifact@v3
      with:
        path: site

    - uses: actions/deploy-pages@v4
