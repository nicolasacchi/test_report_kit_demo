name: Test Report
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - run: bundle exec rails db:create db:migrate
      env:
        RAILS_ENV: test

    - name: Run tests with reporting
      env:
        RAILS_ENV: test
        TEST_REPORT_BRANCH: ${{ github.head_ref || github.ref_name }}
        TEST_REPORT_SHA: ${{ github.sha }}
      run: bundle exec rake test_report:full

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: tmp/test_report/

    - name: PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          let s;
          try { s = JSON.parse(fs.readFileSync('tmp/test_report/summary.json','utf8')); }
          catch(e) { return; }
          const d = s.diff_coverage_passed ? '✅' : '❌';
          const body = [
            '## Test Report',
            '',
            `${d} **Diff Coverage: ${s.diff_coverage_pct??'N/A'}%** (threshold: ${s.diff_coverage_threshold}%) -- ${s.diff_covered_lines??0}/${s.diff_executable_lines??0} changed lines`,
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| Coverage | ${s.coverage_pct}% |`,
            `| Duration | ${s.duration_formatted} |`,
            `| Examples | ${s.total_examples} |`,
            '',
            '[Full Report](https://nicolasacchi.github.io/test_report_kit_demo/main/)'
          ].join('\n');
          const {data:comments} = await github.rest.issues.listComments({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number});
          const ex = comments.find(c=>c.body?.includes('Test Report'));
          const p = {owner:context.repo.owner,repo:context.repo.repo,body};
          if(ex) await github.rest.issues.updateComment({...p,comment_id:ex.id});
          else await github.rest.issues.createComment({...p,issue_number:context.issue.number});

    - name: Diff coverage gate
      if: github.event_name == 'pull_request'
      run: |
        P=$(jq -r '.diff_coverage_passed' tmp/test_report/summary.json)
        [ "$P" = "false" ] && echo "::error::Below threshold" && exit 1 || echo "Pass"

  deploy-report:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          token: ${{ github.token }}
        continue-on-error: true

      - name: Init site dir
        run: |
          if [ ! -d site/.git ]; then
            mkdir -p site
            cd site
            git init -b gh-pages
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit --allow-empty -m "Init gh-pages"
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: test-report
          path: report

      - name: Copy report to branch directory
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          BRANCH_DIR=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
          rm -rf "site/${BRANCH_DIR}"
          cp -r report "site/${BRANCH_DIR}"

      - name: Generate landing page
        run: |
          cat > site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><title>Test Report Kit Demo</title>
          <style>
            body { font-family: 'JetBrains Mono', monospace; background: #0b0e14; color: #e2e8f0; padding: 48px; max-width: 600px; margin: 0 auto; }
            h1 { font-size: 20px; margin-bottom: 8px; }
            h1 span { color: #3b82f6; }
            p { color: #556177; font-size: 13px; margin-bottom: 32px; }
            a { color: #3b82f6; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .list { list-style: none; padding: 0; }
            .list li { padding: 12px 16px; border: 1px solid #1a2230; border-radius: 8px; margin-bottom: 8px; background: #161c28; }
            .list li:hover { border-color: #232d3f; }
          </style>
          </head>
          <body>
          <h1><span>&rarr;</span> test_report_kit_demo<span>/</span>reports</h1>
          <p>Coverage and profiling dashboards generated by <a href="https://github.com/nicolasacchi/test_report_kit">test_report_kit</a></p>
          <ul class="list" id="reports"></ul>
          <script>
          HTMLEOF
          echo "const reports = [" >> site/index.html
          for dir in site/*/; do
            [ -f "${dir}index.html" ] && echo "  '$(basename $dir)'," >> site/index.html
          done
          echo "];" >> site/index.html
          cat >> site/index.html << 'HTMLEOF2'
          reports.forEach(r => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${r}/">${r}</a>`;
            document.getElementById('reports').appendChild(li);
          });
          </script>
          </body></html>
          HTMLEOF2

      - name: Push to gh-pages
        run: |
          cd site
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || git commit -m "Deploy report for ${{ github.ref_name }}"
          git push origin gh-pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
