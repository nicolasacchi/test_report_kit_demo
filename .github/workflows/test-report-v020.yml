name: Test Report (v0.2.0 Demo)
on:
  push:
    branches: ['feature/v0.2.0-demo']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Bundle install
      run: |
        rm -rf vendor/bundle/ruby/*/cache/bundler/git/test_report_kit-*
        bundle config set --local github.https true
        bundle install

    - run: bundle exec rails db:create db:migrate
      env:
        RAILS_ENV: test

    - name: Build trend history (runs 1-4)
      env:
        RAILS_ENV: test
        TEST_REPORT_BRANCH: ${{ github.ref_name }}
        TEST_REPORT_SHA: ${{ github.sha }}
      run: |
        for i in 1 2 3 4; do
          echo "=== Trend run $i ==="
          bundle exec rake test_report:full
        done

    - name: Final test run (run 5)
      env:
        RAILS_ENV: test
        TEST_REPORT_BRANCH: ${{ github.ref_name }}
        TEST_REPORT_SHA: ${{ github.sha }}
      run: bundle exec rake test_report:full

    - name: Generate PR comment markdown
      env:
        RAILS_ENV: test
      run: |
        bundle exec ruby -e "
          require 'test_report_kit/pr_comment'
          puts TestReportKit::PRComment.format('tmp/test_report/summary.json')
        " > tmp/test_report/pr_comment.md
        echo '---'
        cat tmp/test_report/pr_comment.md

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        include-hidden-files: true
        path: tmp/test_report/

  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
    steps:
    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: site
      continue-on-error: true

    - name: Init site dir
      run: |
        if [ ! -d site/.git ]; then
          mkdir -p site
          cd site
          git init -b gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "Init gh-pages"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        fi

    - uses: actions/download-artifact@v4
      with:
        name: test-report
        path: report

    - name: Copy report
      env:
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        BRANCH_DIR=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
        rm -rf "site/${BRANCH_DIR}"
        cp -r report "site/${BRANCH_DIR}"

    - name: Generate landing page
      run: |
        cat > site/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="en">
        <head><meta charset="UTF-8"><title>Test Report Kit Demo</title>
        <style>
          body { font-family: 'JetBrains Mono', monospace; background: #0b0e14; color: #e2e8f0; padding: 48px; max-width: 600px; margin: 0 auto; }
          h1 { font-size: 20px; margin-bottom: 8px; }
          h1 span { color: #3b82f6; }
          p { color: #556177; font-size: 13px; margin-bottom: 32px; }
          a { color: #3b82f6; text-decoration: none; }
          a:hover { text-decoration: underline; }
          .list { list-style: none; padding: 0; }
          .list li { padding: 12px 16px; border: 1px solid #1a2230; border-radius: 8px; margin-bottom: 8px; background: #161c28; }
          .list li:hover { border-color: #232d3f; }
        </style>
        </head>
        <body>
        <h1><span>&rarr;</span> test_report_kit_demo<span>/</span>reports</h1>
        <p>Coverage and profiling dashboards generated by <a href="https://github.com/nicolasacchi/test_report_kit">test_report_kit</a></p>
        <ul class="list" id="reports"></ul>
        <script>
        HTMLEOF
        echo "const reports = [" >> site/index.html
        for dir in site/*/; do
          [ -f "${dir}index.html" ] && echo "  '$(basename $dir)'," >> site/index.html
        done
        echo "];" >> site/index.html
        cat >> site/index.html << 'HTMLEOF2'
        reports.forEach(r => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${r}/">${r}</a>`;
          document.getElementById('reports').appendChild(li);
        });
        </script>
        </body></html>
        HTMLEOF2

    - name: Push to gh-pages
      run: |
        cd site
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add -A
        git diff --staged --quiet || git commit -m "Deploy v0.2.0 demo report"
        git push origin gh-pages

    - uses: actions/upload-pages-artifact@v3
      with:
        path: site

    - uses: actions/deploy-pages@v4
